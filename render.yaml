services:
  - type: web
    name: irina-realty
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn irina_realty.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: irina-realty-db
          property: connectionString
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: irina-realty.onrender.com,127.0.0.1,localhost
      - key: CSRF_TRUSTED_ORIGINS
        value: https://irina-realty.onrender.com
      - key: DEBUG
        value: false
    databases:
      - name: irina-realty-db
        plan: free